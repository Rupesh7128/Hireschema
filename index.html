  <meta name="keywords"

  <title>HireSchema | The Ultimate Interview Prep Kit</title>

  <!-- CRITICAL: Early Polyfill for process/global to prevent library crashes -->

    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ea580c'/%3E%3Cpath d='M10 9v14M22 9v14M10 16h12' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />

  <!-- Preconnect to critical domains for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
  <link rel="dns-prefetch" href="https://checkout.dodopayments.com" />

  <!-- Google tag (gtag.js) - defer for performance -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M99635SH9J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <!-- PDF.js for Client-Side Text Extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
  <script>
    // Initialize PDF.js worker safely
    try {
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    } catch (e) {
      console.warn('PDF.js worker init failed', e);
    }
  </script>
  <script>
    // Global runtime error overlay to prevent black screen
    (function () {
      function overlay(message) {
        var root = document.getElementById('root') || document.body;
        root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#09090b;color:#e4e4e7;font-family:monospace;padding:20px;text-align:center">\n' +
          '<h2 style="color:#f97316;margin-bottom:10px">Runtime Error</h2>\n' +
          '<pre style="background:#18181b;padding:15px;border-radius:8px;margin-top:20px;color:#ef4444;max-width:800px;overflow:auto">' + String(message || 'Unknown error') + '</pre>\n' +
          '</div>';
      }
      window.addEventListener('error', function (e) { try { overlay(e.error?.message || e.message); } catch (_) { } });
      window.addEventListener('unhandledrejection', function (e) { try { overlay(e.reason?.message || String(e.reason)); } catch (_) { } });
    })();
  </script>
</head>

<body>
  <div id="root">
    <div
      style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #09090b; color: #fff; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
      <div
        style="width: 40px; height: 40px; border: 3px solid rgba(249, 115, 22, 0.3); border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite;">
      </div>
      <p style="margin-top: 20px; font-size: 12px; color: #71717a; letter-spacing: 0.1em; text-transform: uppercase;">
        Loading HireSchema...</p>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
